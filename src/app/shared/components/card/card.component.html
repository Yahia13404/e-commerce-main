<div
  class="relative group rounded-3xl bg-white border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 overflow-hidden w-full max-w-xs sm:max-w-sm mx-auto"
>
  <!-- Wishlist Button -->
  <button
    class="absolute top-3 right-3 sm:top-4 sm:right-4 z-20 bg-white/80 backdrop-blur-md p-2 sm:p-2.5 rounded-full shadow-sm hover:bg-white transition-all duration-300 active:scale-75 cursor-pointer"
    (click)="$event.stopPropagation(); iswishlist = !iswishlist; toggleIcone(product._id)"
  >
    <i
      class="fa-heart text-base sm:text-xl transition-all duration-300"
      [class.fa-solid]="iswishlist"
      [class.fa-regular]="!iswishlist"
      [class.text-red-500]="iswishlist"
      [class.text-gray-400]="!iswishlist"
    ></i>
  </button>

  <div [routerLink]="['/details', product.slug, product._id]" class="cursor-pointer">
    <!-- Image Area -->
    <div
      class="aspect-square bg-gray-50/50 overflow-hidden flex items-center justify-center p-4 sm:p-6"
    >
      <img
        [src]="product.imageCover"
        [alt]="product.title"
        class="w-full h-full object-contain mix-blend-multiply group-hover:scale-110 transition-transform duration-700 ease-out"
      />
    </div>

    <!-- Info Area -->
    <div class="p-4 sm:p-6">
      <div class="flex justify-between items-start mb-1">
        <span
          class="text-[9px] sm:text-[10px] font-black uppercase tracking-[0.15em] text-emerald-600 truncate max-w-[60%]"
        >
          {{ product.category.name }}
        </span>
        <div class="flex items-center gap-1 shrink-0">
          <i class="fa-solid fa-star text-yellow-400 text-[10px]"></i>
          <span class="text-xs font-bold text-gray-500">{{ product.ratingsAverage }}</span>
        </div>
      </div>

      <h2
        class="text-gray-800 font-bold text-base sm:text-lg leading-tight truncate group-hover:text-emerald-600 transition-colors"
      >
        {{ product.title }}
      </h2>

      <div class="mt-3 sm:mt-4 flex items-baseline gap-1">
        <span class="text-xl sm:text-2xl font-black text-gray-900">{{ product.price }}</span>
        <span class="text-xs font-bold text-gray-400 uppercase">EGP</span>
      </div>
    </div>
  </div>

  <!-- Add to Cart Button -->
  <!-- On touch devices (mobile), always show the button. On desktop, slide in on hover. -->
  <button
    (click)="addProductItemtocart(product._id)"
    class="w-full cursor-pointer bg-gray-900 hover:bg-emerald-600 text-white py-3 sm:py-4 flex items-center justify-center gap-2 sm:gap-3 translate-y-0 sm:translate-y-full sm:group-hover:translate-y-0 transition-all duration-300 ease-in-out font-bold uppercase tracking-widest text-xs"
  >
    <i class="fa-solid fa-cart-plus text-sm"></i>
    Add To Cart
  </button>
</div>
