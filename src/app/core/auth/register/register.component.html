<section class="min-h-screen flex items-center justify-center py-20 px-4 bg-gray-50/50">
  <div
    class="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl shadow-gray-200/60 p-8 md:p-16 border border-gray-100"
  >
    <div class="text-center mb-12">
      <div class="inline-block p-4 rounded-3xl bg-emerald-50 text-emerald-600 mb-4">
        <i class="fa-solid fa-user-plus text-2xl"></i>
      </div>
      <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-3">Create Account</h1>
      <p class="text-gray-500 font-medium">Join us and start your shopping journey today.</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="submitForm()" class="space-y-5">
      <app-input
        [control]="registerForm.get('name')"
        [typeInput]="'text'"
        [idInput]="'name'"
        [labelInput]="'Full Name'"
        class="block"
      ></app-input>

      <app-input
        [control]="registerForm.get('email')"
        [typeInput]="'email'"
        [idInput]="'email'"
        [labelInput]="'Email Address'"
      ></app-input>

      <div class="grid md:grid-cols-2 gap-5">
        <app-input
          [control]="registerForm.get('password')"
          [idInput]="'password'"
          [labelInput]="'Password'"
        >
          <span class="text-sm uppercase font-bold tracking-tighter">Must match pattern</span>
        </app-input>

        <app-input
          [control]="registerForm.get('rePassword')"
          [idInput]="'rePassword'"
          [labelInput]="'RePassword'"
        ></app-input>
      </div>

      <div class="relative group">
        <app-input
          [control]="registerForm.get('phone')"
          [typeInput]="'tel'"
          [idInput]="'phone'"
          [labelInput]="'Phone Number'"
        >
          <span class="text-sm uppercase font-bold text-emerald-600">Egypt (+20) numbers only</span>
        </app-input>
      </div>

      <div class="pt-6">
        <button
          [disabled]="registerForm.invalid || isLoading"
          class="w-full cursor-pointer bg-gray-900 hover:bg-emerald-600 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs transition-all duration-300 shadow-xl shadow-gray-200 active:scale-95 flex items-center justify-center gap-3"
          type="submit"
        >
          @if (isLoading) {
            <i class="fas fa-spinner fa-spin text-lg"></i>
            <span>Creating Account...</span>
          } @else {
            <span>Register Now</span>
            <i class="fa-solid fa-arrow-right"></i>
          }
        </button>
      </div>

      @if (msgError) {
        <div
          class="mt-4 p-4 rounded-2xl bg-red-50 border border-red-100 flex items-center gap-3 animate-headshake"
        >
          <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
          <p class="text-xs font-bold text-red-700">{{ msgError }}</p>
        </div>
      }

      <div class="text-center mt-8 pt-8 border-t border-gray-50">
        <p class="text-sm text-gray-500">
          Already have an account?
          <a
            routerLink="/login"
            class="text-emerald-600 font-bold hover:underline cursor-pointer underline-offset-4"
            >Log in here</a
          >
        </p>
      </div>
    </form>
  </div>
</section>
