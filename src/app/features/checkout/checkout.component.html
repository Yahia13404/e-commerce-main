<section class="min-h-screen flex items-center justify-center py-16 px-4 bg-gray-50/50">
  <div
    class="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl shadow-gray-200/60 p-8 md:p-16 border border-gray-100"
  >
    <div class="text-center mb-12">
      <div class="inline-block p-4 rounded-3xl bg-emerald-50 text-emerald-600 mb-4">
        <i class="fa-solid fa-truck-fast text-2xl"></i>
      </div>
      <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-3">Shipping Details</h1>
      <p class="text-gray-500 font-medium">Where should we send your order?</p>
    </div>

    <form [formGroup]="checkOutform" (ngSubmit)="submitForm($event)" class="space-y-6">
      <app-input
        [element]="'text'"
        [control]="checkOutform.get('shippingAdress')?.get('details')"
        [idInput]="'details'"
        [labelInput]="'Street Address / Building'"
      ></app-input>

      <div class="grid md:grid-cols-2 gap-5">
        <app-input
          [control]="checkOutform.get('shippingAdress')?.get('phone')"
          [idInput]="'phone'"
          [labelInput]="'Phone Number'"
        >
          <span class="text-sm uppercase font-bold text-emerald-600">Egypt (+20) numbers</span>
        </app-input>

        <app-input
          [control]="checkOutform.get('shippingAdress')?.get('city')"
          [idInput]="'city'"
          [labelInput]="'City / Governorate'"
        ></app-input>
      </div>

      <div class="pt-10">
        <p class="text-center text-xs font-black uppercase tracking-[0.2em] text-gray-400 mb-6">
          Select Payment Method
        </p>

        <div class="flex flex-col sm:flex-row gap-4">
          <button
            type="submit"
            value="visa"
            [disabled]="checkOutform.invalid"
            class="flex-1 cursor-pointer bg-gray-900 hover:bg-blue-600 disabled:bg-gray-200 text-white py-5 rounded-2xl font-bold transition-all duration-300 shadow-xl shadow-gray-200 active:scale-95 flex items-center justify-center gap-3 group"
          >
            <i class="fa-solid fa-credit-card transition-transform group-hover:-rotate-12"></i>
            Pay with Visa
          </button>

          <button
            type="submit"
            value="cash"
            [disabled]="checkOutform.invalid"
            class="flex-1 cursor-pointer bg-emerald-500 hover:bg-emerald-600 disabled:bg-gray-200 text-white py-5 rounded-2xl font-bold transition-all duration-300 shadow-xl shadow-emerald-100 active:scale-95 flex items-center justify-center gap-3"
          >
            <i class="fa-solid fa-money-bill-wave"></i>
            Cash on Delivery
          </button>
        </div>
      </div>

      <div
        class="mt-8 flex items-center justify-center gap-2 text-gray-400 text-sm font-bold uppercase tracking-widest"
      >
        <i class="fa-solid fa-lock text-emerald-500"></i>
        SSL Secure Checkout
      </div>
    </form>
  </div>
</section>
