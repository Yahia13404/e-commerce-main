<section class="bg-gray-50 py-20">
  <div class="container mx-auto px-4">
    <div class="flex flex-col items-center mb-12">
      <h2
        class="text-4xl md:text-5xl font-bold tracking-tight bg-linear-to-r from-emerald-700 to-emerald-400 bg-clip-text text-transparent"
      >
        Shop by Category
      </h2>
      <div class="h-1 w-24 bg-gray-200 rounded-full mt-3 overflow-hidden">
        <div class="h-full w-1/2 bg-emerald-500"></div>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
      @for (category of categoriesList; track category._id) {
        <div
          class="group relative bg-white rounded-3xl p-4 shadow-sm hover:shadow-2xl transition-all duration-500 cursor-pointer border border-gray-100"
        >
          <div class="aspect-square rounded-2xl bg-gray-50 overflow-hidden mb-4">
            <img
              [src]="category.image"
              [alt]="category.name"
              class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out"
            />
          </div>

          <div class="text-center">
            <h3
              class="text-base md:text-lg font-bold text-gray-800 group-hover:text-emerald-600 transition-colors"
            >
              {{ category.name }}
            </h3>
            <p
              class="text-xs text-gray-400 mt-1 uppercase tracking-widest font-medium opacity-0 group-hover:opacity-100 transition-opacity"
            >
              Explore Now
            </p>
          </div>

          <div
            class="absolute inset-0 rounded-3xl ring-1 ring-inset ring-black/5 group-hover:ring-emerald-500/20 transition-all"
          ></div>
        </div>
      }
    </div>
  </div>
</section>
