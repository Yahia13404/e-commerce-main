<section class="bg-gray-100 py-12 border border-gray-500">
  <div class="container mx-auto px-6">
    <div class="flex flex-col items-center mb-12">
      <h2
        class="text-4xl md:text-5xl font-bold tracking-tight bg-linear-to-r from-emerald-700 to-emerald-400 bg-clip-text text-transparent"
      >
        Popular Products
      </h2>
      <div class="h-1 w-24 bg-gray-200 rounded-full mt-3 overflow-hidden">
        <div class="h-full w-1/2 bg-emerald-500"></div>
      </div>
    </div>
    <div class="parent mt-10 grid sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-6 gap-y-8 gap-4">
      @for (product of productsList.slice(0, 12); track product.id) {
        <app-card [product]="product" />
      }
    </div>
  </div>
</section>
