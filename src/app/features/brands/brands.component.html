<section class="bg-white py-20">
  <div class="container mx-auto px-4">
    <div class="flex flex-col items-center mb-12">
      <h2
        class="text-4xl md:text-5xl font-bold tracking-tight bg-linear-to-r from-emerald-700 to-emerald-400 bg-clip-text text-transparent"
      >
        Shop by Brand
      </h2>
      <div class="h-1 w-24 bg-gray-200 rounded-full mt-3 overflow-hidden">
        <div class="h-full w-1/2 bg-emerald-500"></div>
      </div>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
      @for (brand of brandsList; track brand._id) {
        <div
          class="group relative aspect-auto-[3/2] bg-gray-50/50 rounded-2xl border border-gray-100 flex items-center justify-center p-6 cursor-pointer transition-all duration-500 hover:bg-white hover:shadow-xl hover:shadow-emerald-900/5 hover:-translate-y-1 hover:border-emerald-200"
        >
          <img
            [src]="brand.image"
            [alt]="brand.name"
            class="max-h-full max-w-full object-contain opacity-60 grayscale group-hover:grayscale-0 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500 ease-out"
          />

          <span
            class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-emerald-600 text-white text-[10px] font-bold px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 group-hover:bottom-4 transition-all duration-300 shadow-lg uppercase tracking-tighter"
          >
            {{ brand.name }}
          </span>
        </div>
      }
    </div>
  </div>
</section>
